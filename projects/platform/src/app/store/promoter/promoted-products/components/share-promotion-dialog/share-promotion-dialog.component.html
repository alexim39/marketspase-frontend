<!-- promoted-products/components/share-promotion-dialog/share-promotion-dialog.component.html -->
<div class="share-dialog">
  <div class="dialog-header">
    <h2>Share Promotion</h2>
    <button class="close-btn" (click)="close()">
      <span class="material-icons">close</span>
    </button>
  </div>

  <div class="dialog-content">
    <div class="product-info">
      <span class="product-name">{{ productName }}</span>
      <span class="commission-badge">{{ commissionRate }}% Commission</span>
    </div>

    <div class="share-link-container">
      <input type="text" [value]="shareLink" readonly class="share-link-input" />
      <button class="copy-btn" (click)="copyLink()">
        <span class="material-icons">content_copy</span>
        Copy
      </button>
    </div>

    <p class="share-instruction">Share via:</p>

    <div class="share-options">
      <button class="share-option whatsapp" (click)="shareOnWhatsApp()">
        <span class="share-icon">📱</span>
        <span>WhatsApp</span>
      </button>

      <button class="share-option facebook" (click)="shareOnFacebook()">
        <span class="share-icon">📘</span>
        <span>Facebook</span>
      </button>

      <button class="share-option twitter" (click)="shareOnTwitter()">
        <span class="share-icon">🐦</span>
        <span>Twitter</span>
      </button>

      <button class="share-option email" (click)="shareViaEmail()">
        <span class="share-icon">📧</span>
        <span>Email</span>
      </button>
    </div>

    <div class="tracking-info">
      <p>Tracking Code: <strong>{{ trackingCode }}</strong></p>
      <p class="info-note">You'll earn commission on all sales through this link</p>
    </div>
  </div>
</div>
