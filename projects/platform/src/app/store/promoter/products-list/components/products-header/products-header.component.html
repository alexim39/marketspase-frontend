<header class="page-header">
    <div class="header-background">
    <div class="header-content">
        <div class="header-text">
        <h1 class="page-title">Find Products to Promote</h1>
        <p class="page-subtitle">
            Browse available products from verified stores and start earning commissions
        </p>
        </div>
        <div class="header-stats">
        <div class="stat-card">
            <div class="stat-icon">
            <mat-icon>inventory</mat-icon>
            </div>
            <div class="stat-content">
            <span class="stat-value">{{ stats.total | number }}</span>
            <span class="stat-label">Products</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
            <mat-icon>store</mat-icon>
            </div>
            <div class="stat-content">
            <span class="stat-value">{{ stats.stores | number }}</span>
            <span class="stat-label">Stores</span>
            </div>
        </div>
        <div class="stat-card highlight">
            <div class="stat-icon">
            <mat-icon>trending_up</mat-icon>
            </div>
            <div class="stat-content">
            <span class="stat-value">{{ stats.avgCommission | number:'1.0-1' }}%</span>
            <span class="stat-label">Avg. Commission</span>
            </div>
        </div>
        </div>
    </div>
    </div>
</header>
