<!-- promoter-products-list.component.html -->
<div class="promoter-products-container">
  <!-- Header Section -->
  <app-products-header [stats]="stats()" />

  <!-- Main Content -->
  <main class="main-content">
    <!-- Filters Sidebar -->
     @if (deviceType() === 'desktop') {
      <app-products-filter-sidebar
        [categories]="categories()"
        [priceRange]="priceRange()"
        [user]="user()"
        [commissionRange]="commissionRange()"
        (filterChange)="applyFilters($event)"
      />
     }

    <!-- Products Content -->
    <app-products-content-view
      [products]="products()"
      [user]="user()"
      [loading]="loading()"
      [error]="error()"
      [totalProducts]="totalProducts()"
      [totalPages]="totalPages()"
      [currentPage]="currentPage()"
      [pageSize]="pageSize()"
      [activePromotions]="activePromotions()"
      (viewProduct)="viewProductDetails($event)"
      (shareWhatsApp)="generateWhatsAppMessage($event)"
      (promoteProduct)="onPromote($event)"
      (copyProductUrl)="copyProductUrl($event)"
      (retry)="retryLoading()"
      (clearFilters)="applyFilters({})"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onPageSizeChange($event)"
    />
  </main>
</div>
