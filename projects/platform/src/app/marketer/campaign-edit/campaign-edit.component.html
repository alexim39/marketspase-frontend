<!-- campaign-edit.component.html -->
<div class="campaign-edit-container">
  <!-- Header Section -->
  <app-campaign-edit-header
    [isFormValid]="campaignForm.valid"
    [isSaving]="isSaving()"
    (goBack)="goBack()"
    (cancel)="cancelEdit()"
    (save)="saveCampaign()">
  </app-campaign-edit-header>

  <!-- Main Content -->
  @if (campaign() && campaignForm) {
    <main class="main-content">
      <div class="container">
        <form [formGroup]="campaignForm" class="edit-form">
          <!-- Basic Information -->
          <app-basic-info-form
            [form]="campaignForm"
            [categories]="categories">
          </app-basic-info-form>

          <!-- Media Upload -->
          <app-media-upload
            [form]="campaignForm"
            [previewImageUrl]="previewImageUrl()"
            [previewVideoUrl]="previewVideoUrl()"
            [uploadProgress]="uploadProgress()"
            (fileSelected)="onFileSelected($event)"
            (mediaRemoved)="removeMedia()">
          </app-media-upload>

          <!-- Budget & Promotion Settings -->
          <app-budget-settings
            [form]="campaignForm"
            (calculateMaxPromoters)="calculateMaxPromoters()">
          </app-budget-settings>

          <!-- Targeting -->
          <div class="form-card">
            <div class="card-header">
              <h2>Targeting Options</h2>
              <p>Set geographic targeting for your campaign</p>
            </div>
            <div class="card-content">
              <app-targeting
                [enableTarget]="campaignForm.get('enableTarget')?.value"
                [targetLocations]="targetLocations()"
                [locationSuggestions]="locationSuggestions"
                [locationInputControl]="locationInputControl"
                (enableTargetChange)="campaignForm.get('enableTarget')?.setValue($event)"
                (addLocation)="addLocation($event)"
                (removeLocation)="removeLocation($event)"
                (addLocationFromAutocomplete)="addLocationFromAutocomplete($event)">
              </app-targeting>
            </div>
          </div>

          <!-- Schedule -->
          <app-schedule-form [form]="campaignForm"></app-schedule-form>

          <!-- Requirements -->
          <app-requirements-form [form]="campaignForm"></app-requirements-form>
        </form>
      </div>
    </main>
  }

  <!-- Loading State -->
  @if (isLoading()) {
    <app-loading-state message="Loading campaign data..."></app-loading-state>
  }

  <!-- Error State -->
  @if (error()) {
    <app-error-state
      [error]="error()!"
      (retry)="loadCampaign()">
    </app-error-state>
  }
</div>
