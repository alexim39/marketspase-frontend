<!-- targeting.component.html -->
<div class="form-row">
  <mat-slide-toggle [checked]="enableTarget" (change)="enableTargetChange.emit($event.checked)" color="primary">
    Enable Geographic Targeting
  </mat-slide-toggle>
  <span class="toggle-hint">Limit promotions to specific locations</span>
</div>

@if (enableTarget) {
  <div class="form-row targeting-options">
    <mat-form-field appearance="outline" class="form-field-full">
      <mat-label>Target Locations</mat-label>
      <mat-chip-grid #chipGrid aria-label="Target locations">
        @for (location of targetLocations; track location) {
          <mat-chip-row (removed)="removeLocation.emit(location)">
            {{ location }}
            <button matChipRemove [attr.aria-label]="'remove ' + location">
              <mat-icon>cancel</mat-icon>
            </button>
          </mat-chip-row>
        }
      </mat-chip-grid>
      <input 
        placeholder="Add location..." 
        [matChipInputFor]="chipGrid" 
        [matAutocomplete]="auto"
        [formControl]="locationInputControl"
       
        >
      <!-- <input 
        placeholder="Add location..." 
        [matChipInputFor]="chipGrid" 
        [matAutocomplete]="auto"
        [formControl]="locationInputControl"
        (matChipInputTokenEnd)="addLocation.emit($event)"
        > -->
      <mat-autocomplete #auto="matAutocomplete" (optionSelected)="addLocationFromAutocomplete.emit($event)">
        <mat-option *ngFor="let location of filteredLocationSuggestions()" [value]="location">
          {{ location }}
        </mat-option>
      </mat-autocomplete>
    </mat-form-field>
  </div>
}
