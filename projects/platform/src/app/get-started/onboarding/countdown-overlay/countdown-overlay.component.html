<div class="countdown-overlay" @fadeIn>
  <div class="countdown-container">
    <mat-card class="countdown-card">
      <mat-card-content>
        <div class="countdown-content">
          <div class="countdown-icon">
            <!-- <mat-progress-bar mode="indeterminate"></mat-progress-bar> -->
          </div>
          <h3 class="countdown-title">Switching Role...</h3>
          <p class="countdown-message">
            Your role is being switched
          </p>
          
          <div class="countdown-timer">
            <div class="countdown-circle">
              <svg width="80" height="80" viewBox="0 0 100 100">
                <circle 
                  cx="50" 
                  cy="50" 
                  r="45" 
                  fill="none" 
                  stroke="var(--primary-color)" 
                  stroke-width="8" 
                  stroke-dasharray="283"
                  [attr.stroke-dashoffset]="283 - (283 * displaySeconds) / 5"
                  transform="rotate(-90 50 50)"
                />
              </svg>
              <div class="countdown-number">
                {{ displaySeconds }}
              </div>
            </div>
          </div>
          
          <p class="countdown-hint">
            Page will reload automatically in {{ displaySeconds }} second{{ displaySeconds !== 1 ? 's' : '' }}
          </p>
          
          <div class="countdown-actions">
            <button 
              mat-stroked-button 
              color="warn" 
              (click)="cancel.emit()"
              class="cancel-button">
              <mat-icon>close</mat-icon>
              Cancel Reload
            </button>
            
            <button 
              mat-flat-button 
              color="primary" 
              (click)="reload.emit()"
              class="reload-now-button">
              <mat-icon>refresh</mat-icon>
              Reload Now
            </button>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
