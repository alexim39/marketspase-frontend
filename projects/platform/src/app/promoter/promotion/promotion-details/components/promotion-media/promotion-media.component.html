<div class="promotion-media">
    <div class="media-container">
    <div class="media-type-overlay" [ngClass]="promotion.campaign.mediaType">
        <mat-icon>{{ promotion.campaign.mediaType === 'video' ? 'videocam' : 'image' }}</mat-icon>
        <span>{{ promotion.campaign.mediaType | titlecase }}</span>
    </div>
    
    @if (promotion.campaign.mediaType === 'image') {
        <img [src]="promotion.campaign.mediaUrl" [alt]="promotion.campaign.title" class="media-preview">
    } @else if (promotion.campaign.mediaType === 'video') {
        <div class="video-container">
        <div class="video-placeholder">
            <img 
            [src]="promotion!.campaign!.thumbnailUrl" 
            class="placeholder-img" 
            [alt]="promotion.campaign.title"
            />
            <div class="video-play-btn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
            </div>
        </div>
        </div>
    }
    </div>
    
    <div class="media-actions">
        <button mat-flat-button class="action-btn share-btn" (click)="share.emit()">
            <mat-icon>share</mat-icon>
            <span>Share</span>
        </button>
        
        <button mat-flat-button class="action-btn download-btn" (click)="download()">
            <mat-icon>download</mat-icon>
            <span>Download</span>
        </button>
    </div>

        
</div>
